security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            id: App\Security\UserProvider

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Login endpoint - no authentication required
        login:
            pattern: ^/auth/login$
            stateless: true
            security: false

        # API endpoints requiring JWT authentication
        api_admin:
            pattern: ^/admin
            stateless: true
            provider: app_user_provider
            jwt: ~

        # Auth endpoints (me, refresh) require JWT
        api_auth:
            pattern: ^/auth
            stateless: true
            provider: app_user_provider
            jwt: ~

        # Public API endpoints (no auth required)
        main:
            lazy: true
            stateless: true

    # Role hierarchy
    role_hierarchy:
        ROLE_SUPER_ADMIN: [ROLE_ADMIN, ROLE_MANAGER, ROLE_STAFF, ROLE_USER]
        ROLE_ADMIN: [ROLE_MANAGER, ROLE_STAFF, ROLE_USER]
        ROLE_MANAGER: [ROLE_STAFF, ROLE_USER]
        ROLE_STAFF: [ROLE_USER]

    # Access control rules
    access_control:
        # Admin endpoints require ROLE_ADMIN (profile <= 2)
        - { path: ^/admin, roles: ROLE_ADMIN }
        # Auth me/refresh require authenticated user
        - { path: ^/auth/me, roles: ROLE_USER }
        - { path: ^/auth/refresh, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
