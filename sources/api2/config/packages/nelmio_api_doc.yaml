nelmio_api_doc:
    documentation:
        openapi: 3.1.0
        info:
            title: KPI API2
            description: Modern REST API for Kayak Polo management (Symfony 7.3 + API Platform 4.2)
            version: 2.0.0
        servers:
            - url: '%env(API_DOCS_SERVER_URL)%'
              description: '%env(API_DOCS_SERVER_DESCRIPTION)%'
    html_config:
        assets_mode: bundle  # Use local assets instead of CDN
    areas:
        path_patterns:
            - ^/(?!(_error|doc)) # Accepts all routes except /_error and /doc
