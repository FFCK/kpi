name: '${APPLICATION_NAME}'
services:
    kpi:
        container_name: ${PHP_CONTAINER_NAME}
        build:
            context: ./config
            dockerfile: Dockerfile.dev.web
            args:
                USER_ID: ${USER_ID}
                GROUP_ID: ${GROUP_ID}
                BASE_IMAGE_PHP: ${BASE_IMAGE_PHP}
        user: ${USER_ID}:${GROUP_ID}
        environment:
            - TZ=Europe/Paris
            - LANG=fr_FR.UTF-8
            - LANGUAGE=fr_FR:fr
            - LC_ALL=fr_FR.UTF-8
        ports:
            - 80${DOCKER_SUFFIXE_PORT}:80
        volumes:
            - ../sources:/var/www/html
            - ../DOC:/var/www/html/DOC
            - ${HOST_WORDPRESS_PATH}:/var/www/html/wordpress
            - ./MyParams.php:/var/www/html/commun/MyParams.php
            - ./MyConfig.php:/var/www/html/commun/MyConfig.php
            - ./config/opcache-dev.ini:/usr/local/etc/php/conf.d/opcache-dev.ini
            - ./config/000-default.conf:/etc/apache2/sites-enabled/000-default.conf
            - ${HOST_APACHE2_LOG_PATH}:/var/log/apache2/
        networks:
            - network_kpi
            - traefiknetwork
        depends_on:
            - db
        logging:
            driver: "json-file"
            options:
                max-size: 10m
                max-file: 3
        restart: unless-stopped
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.kpi.rule=Host(`${KPI_DOMAIN_NAME}`)"
            - "traefik.http.routers.kpi.entrypoints=websecure"
            - "traefik.http.routers.kpi.tls=true"
            # Configure Traefik to trust X-Forwarded-* headers and preserve real client IP
            - "traefik.http.services.kpi.loadbalancer.passhostheader=true"
    db:
        container_name: ${DB_CONTAINER_NAME}
        build:
            context: ./config
            dockerfile: Dockerfile.db
            args:
                BASE_IMAGE_DB: ${BASE_IMAGE_DB}
        command: mariadbd --sql_mode=""
        volumes:
            - ${HOST_DB_PATH}:/var/lib/mysql/
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_USER: ${DB_USER}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_DATABASE: ${DB_NAME}
            TZ: Europe/Paris
            LANG: fr_FR.UTF-8
            LANGUAGE: fr_FR:fr
            LC_ALL: fr_FR.UTF-8
        networks:
            - network_kpi
            - pma_network
        logging:
            driver: "json-file"
            options:
                max-size: 10m
                max-file: 3
        restart: unless-stopped
    dbwp:
        container_name: ${DBWP_CONTAINER_NAME}
        build:
            context: ./config
            dockerfile: Dockerfile.db
            args:
                BASE_IMAGE_DB: ${BASE_IMAGE_DB}
        volumes:
            - ${HOST_DBWP_PATH}:/var/lib/mysql/
        environment:
            MYSQL_ROOT_PASSWORD: ${DBWP_ROOT_PASSWORD}
            MYSQL_USER: ${DBWP_USER}
            MYSQL_PASSWORD: ${DBWP_PASSWORD}
            MYSQL_DATABASE: ${DBWP_NAME}
            TZ: Europe/Paris
            LANG: fr_FR.UTF-8
            LANGUAGE: fr_FR:fr
            LC_ALL: fr_FR.UTF-8
        # ports:
        #     - 33${DOCKER_SUFFIXE_PORT}:3306
        networks:
            - network_kpi
            - pma_network
        logging:
            driver: "json-file"
            options:
                max-size: 10m
                max-file: 3
        restart: unless-stopped
    node_app2:
        container_name: kpi_node_app2
        build:
            context: ../sources/app2
            dockerfile: ../../docker/node/Dockerfile # Crée ce Dockerfile si besoin
        working_dir: /app
        user: "${USER_ID}:${GROUP_ID}"
        volumes:
            - ../sources/app2:/app
        environment:
            - HOST=0.0.0.0
            - PORT=3000
            - TZ=Europe/Paris
            - LANG=fr_FR.UTF-8
            - LANGUAGE=fr_FR:fr
            - LC_ALL=fr_FR.UTF-8
        networks:
            - network_kpi
            - traefiknetwork
        ports:
            - "3002:3000"
        restart: unless-stopped
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.app2.rule=Host(`${NODE_DOMAIN_NAME}`)"
            - "traefik.http.routers.app2.entrypoints=websecure"
            - "traefik.http.routers.app2.tls=true"
            - "traefik.http.services.app2.loadbalancer.server.port=3000"

    node_app3:
        container_name: kpi_node_app3
        build:
            context: ../sources/app3
            dockerfile: ../../docker/node/Dockerfile
        working_dir: /app
        user: "${USER_ID}:${GROUP_ID}"
        volumes:
            - ../sources/app3:/app
        environment:
            - HOST=0.0.0.0
            - PORT=3003
            - TZ=Europe/Paris
            - LANG=fr_FR.UTF-8
            - LANGUAGE=fr_FR:fr
            - LC_ALL=fr_FR.UTF-8
        networks:
            - network_kpi
            - traefiknetwork
        ports:
            - "3003:3003"
        restart: unless-stopped
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.app3.rule=Host(`${APP3_DOMAIN_NAME}`)"
            - "traefik.http.routers.app3.entrypoints=websecure"
            - "traefik.http.routers.app3.tls=true"
            - "traefik.http.services.app3.loadbalancer.server.port=3003"

    nginx_app2:
        container_name: ${APPLICATION_NAME}_nginx_app2
        image: nginx:alpine
        volumes:
            - ../sources/app2/.output/public:/usr/share/nginx/html:ro
            - ./config/nginx-app2.conf:/etc/nginx/conf.d/default.conf:ro
            - ${HOST_NGINX_LOG_PATH}:/var/log/nginx/
        environment:
            - TZ=Europe/Paris
        networks:
            - network_kpi
            - traefiknetwork
        logging:
            driver: "json-file"
            options:
                max-size: 10m
                max-file: 3
        restart: unless-stopped
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.nginx_app2.rule=Host(`app.${KPI_DOMAIN_NAME}`)"
            - "traefik.http.routers.nginx_app2.entrypoints=websecure"
            - "traefik.http.routers.nginx_app2.tls=true"
            - "traefik.http.services.nginx_app2.loadbalancer.server.port=80"


networks:
    network_kpi:
        name: network_${APPLICATION_NAME}
        external: true
    pma_network:
        name: pma_network
        external: true
    traefiknetwork:
        name: traefiknetwork
        external: true
