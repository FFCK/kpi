# Apache mod_remoteip configuration
# Enables Apache to use the real client IP from X-Forwarded-For header
# when behind a reverse proxy (Traefik)

<IfModule mod_remoteip.c>
    # Use X-Forwarded-For header to get real client IP
    RemoteIPHeader X-Forwarded-For

    # Trust Traefik proxy on Docker networks
    # Cover common Docker network ranges (172.16.0.0/12 includes 172.16-31.x.x)
    RemoteIPTrustedProxy 172.16.0.0/12

    # Also trust specific networks in case of different configurations
    RemoteIPTrustedProxy 172.18.0.0/16
    RemoteIPTrustedProxy 172.22.0.0/16

    # Trust localhost
    RemoteIPTrustedProxy 127.0.0.1
    RemoteIPTrustedProxy ::1

    # Define custom log format that uses real client IP (%a instead of %h)
    # %a = Client IP address of the request (real IP after mod_remoteip processing)
    # %h = Remote hostname (proxy IP before mod_remoteip processing)
    LogFormat "%a %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\"" combined_remoteip
</IfModule>
