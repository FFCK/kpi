# Symfony API2 Configuration
Alias /api2 /var/www/html/api2/public

<Directory /var/www/html/api2/public>
    AllowOverride All
    Require all granted

    # Disable auto_prepend_file for API2 - Symfony uses NelmioCorsBundle for CORS
    # This prevents duplicate CORS headers from auto-prepend-cors.php
    php_admin_value auto_prepend_file none

    # Enable rewrite engine for Symfony routing
    <IfModule mod_rewrite.c>
        Options -MultiViews
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^(.*)$ index.php [QSA,L]
    </IfModule>
</Directory>
