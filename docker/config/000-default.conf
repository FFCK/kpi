ServerName kpi.localhost

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    ErrorLog ${APACHE_LOG_DIR}/error.log
    # Use combined_remoteip format to log real client IP (from X-Forwarded-For via mod_remoteip)
    CustomLog ${APACHE_LOG_DIR}/access.log combined_remoteip

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        # CORS headers are managed dynamically by PHP (see api/config/headers.php)
        # Removed static CORS headers to avoid conflicts with PHP-managed headers

        # Handle preflight OPTIONS requests
        RewriteEngine On
        RewriteCond %{REQUEST_METHOD} OPTIONS
        RewriteRule ^(.*)$ $1 [R=200,L]
    </Directory>

    # WordPress subdirectory configuration
    <Directory /var/www/html/wordpress>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        # CORS headers removed - managed by PHP globally (see api/config/headers.php)
    </Directory>
</VirtualHost>

<FilesMatch \.php$>
    SetHandler application/x-httpd-php
</FilesMatch>
