server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Charset UTF-8
    charset utf-8;

    # Disable sendfile for Docker volumes (development)
    # This prevents file caching issues when files are updated on mounted volumes
    sendfile off;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Disable access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Main location - serve static files from Nuxt build
    location / {
        try_files $uri $uri/ /index.html;

        # Disable cache for HTML files in development
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # Cache static assets (but shorter expiry for development)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        # Development: shorter cache (1 hour instead of 1 year)
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
}
