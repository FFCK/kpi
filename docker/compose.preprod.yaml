name: '${APPLICATION_NAME}'
services:
    kpi_preprod:
        container_name: ${PHP_CONTAINER_NAME}
        build:
            context: ./config
            dockerfile: Dockerfile.dev.web
            args:
                USER_ID: ${USER_ID}
                GROUP_ID: ${GROUP_ID}
                BASE_IMAGE_PHP: ${BASE_IMAGE_PHP}
        user: ${USER_ID}:${GROUP_ID}
        environment:
            - SMTP_HOST=host.docker.internal
            - SMTP_PORT=25
            - SMTP_PASSWORD=${SMTP_PASSWORD}
            - TZ=Europe/Paris
            - LANG=fr_FR.UTF-8
            - LANGUAGE=fr_FR:fr
            - LC_ALL=fr_FR.UTF-8
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ../sources:/var/www/html
            - ../DOC:/var/www/html/DOC
            - ${HOST_WORDPRESS_PATH}:/var/www/html/wordpress
            - ./config/000-default.conf:/etc/apache2/sites-enabled/000-default.conf
            - ${HOST_APACHE2_LOG_PATH}:/var/log/apache2/
            - /etc/msmtprc:/etc/msmtprc:ro
            - /var/log/msmtp:/var/log/msmtp
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        networks:
            - network_kpi
            - traefiknetwork
        depends_on:
            - db_preprod
        logging:
            driver: "json-file"
            options:
                max-size: 10m
                max-file: 3
        restart: unless-stopped
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.kpipreprod.rule=Host(`${KPI_DOMAIN_NAME}`)"
            - "traefik.http.routers.kpipreprod.entrypoints=websecure"
            - "traefik.http.routers.kpipreprod.tls=true"
            - "traefik.http.routers.kpipreprod.tls.certresolver=myresolver"
    db_preprod:
        container_name: ${DB_CONTAINER_NAME}
        build:
            context: ./config
            dockerfile: Dockerfile.db
            args:
                BASE_IMAGE_DB: ${BASE_IMAGE_DB}
        command: mariadbd --sql_mode=""
        volumes:
            - ${HOST_DB_PATH}:/var/lib/mysql/
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_USER: ${DB_USER}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_DATABASE: ${DB_NAME}
            TZ: Europe/Paris
            LANG: fr_FR.UTF-8
            LANGUAGE: fr_FR:fr
            LC_ALL: fr_FR.UTF-8
        networks:
            - network_kpi
            - pma_network
        logging:
            driver: "json-file"
            options:
                max-size: 10m
                max-file: 3
        restart: unless-stopped
    dbwp_preprod:
        container_name: ${DBWP_CONTAINER_NAME}
        build:
            context: ./config
            dockerfile: Dockerfile.db
            args:
                BASE_IMAGE_DB: ${BASE_IMAGE_DB}
        volumes:
            - ${HOST_DBWP_PATH}:/var/lib/mysql/
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        environment:
            MYSQL_ROOT_PASSWORD: ${DBWP_ROOT_PASSWORD}
            MYSQL_USER: ${DBWP_USER}
            MYSQL_PASSWORD: ${DBWP_PASSWORD}
            MYSQL_DATABASE: ${DBWP_NAME}
            TZ: Europe/Paris
            LANG: fr_FR.UTF-8
            LANGUAGE: fr_FR:fr
            LC_ALL: fr_FR.UTF-8
        networks:
            - network_kpi
            - pma_network
        logging:
            driver: "json-file"
            options:
                max-size: 10m
                max-file: 3
        restart: unless-stopped

    nginx_app2:
        container_name: ${APPLICATION_NAME}_nginx_app2
        image: nginx:alpine
        volumes:
            - ../sources/app2/.output/public:/usr/share/nginx/html:ro
            - ./config/nginx-app2-prod.conf:/etc/nginx/conf.d/default.conf:ro
            - ${HOST_NGINX_LOG_PATH}:/var/log/nginx/
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        environment:
            - TZ=Europe/Paris
        networks:
            - network_kpi
            - traefiknetwork
        logging:
            driver: "json-file"
            options:
                max-size: 10m
                max-file: 3
        restart: unless-stopped
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.nginx_app2_preprod.rule=Host(`app.${KPI_DOMAIN_NAME}`)"
            - "traefik.http.routers.nginx_app2_preprod.entrypoints=websecure"
            - "traefik.http.routers.nginx_app2_preprod.tls=true"
            - "traefik.http.routers.nginx_app2_preprod.tls.certresolver=myresolver"
            - "traefik.http.services.nginx_app2_preprod.loadbalancer.server.port=80"

networks:
    network_kpi:
        external: true
        name: network_${APPLICATION_NAME}
    pma_network:
        name: pma_network
        external: true
    traefiknetwork:
        name: traefiknetwork
        external: true
